<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Contact Form</title>
	<link rel="shortcut icon" href="imgs/bg.png" type="image/x-icon">
	<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>

	<link rel="stylesheet" href="css/style.css">
	<link rel="stylesheet" href="css/contact.css">
	<link rel="stylesheet" href="css/media.css">

	<script src="js/script.js" defer></script>
</head>
<body>
	<!-- CONTACT FORM -->
	<section class="contact">
		<div class="center">
			<h3>Contact me</h3>
			<!-- <p>Open to conversations, ideas, and opportunities. Feel free to get in touch..</p> -->
		</div>

		<div class="contact-form">
			<form action="https://formspree.io/f/xoqgyqzq" method="POST">
				<input type="text" name="name" id="name" placeholder="Name" autocomplete="off" required><br>

				<input type="email" name="email" id="email" placeholder="Email" autocomplete="off" required><br>

				<textarea name="message" id="msg" placeholder="Send me a message.." required></textarea><br>

				<button type="submit">Send message <i class="ri-send-plane-fill"></i></button>
			</form>
		</div>
		
	</section>

	<footer class="socials">
		<a href="https://www.facebook.com/argie.piamonte.35" target="_blank"><i class="ri-facebook-line fb"></i></a>
		<a href="https://www.instagram.com/iamrg369/" target="_blank"><i class="ri-instagram-line"></i></a>
		<a href="https://x.com/ArgiePiamonte" target="_blank"><i class="ri-twitter-x-line x"></i></a>  
		<a href="https://www.linkedin.com/in/argie-piamonte-06aba71b9/" target="_blank"><i class="ri-linkedin-box-fill"></i></a>
	</footer>
</body>
</html>
